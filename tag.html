<!DOCTYPE html>
<html>
    <head>
        <title>ㅎㅅㅎ - 태그 연습</title>
        <link rel="stylesheet" href="tag.css">
    </head>
    <body>
        
        <h1>HTML</h1>
        <dl>
            <dt><span>HTML</span>이란?</dt>
            <dd><span>H</span>yper <span>T</span>ext <span>M</span>arkup <span>L</span>anguage
            <br>웹사이트를 만드는데 가장 뼈대가 되는 마크업 언어이다.</dd>
        </dl>
        <h2>HTML 태그</h2>
        <dl>
            <dt>a 태그</dt>
            <dd><span>하이퍼링크</span>를 생성하는 태그이다.</dd>
            <br>
            <dt>p 태그</dt>
            <dd><span>텍스트</span>를 생성하는 태그이다.</dd>
            <br>
            <dt>img 태그</dt>
            <dd><span>이미지</span>를 삽입하는 태그이다.</dd>
            <br>
            <dt><strong>ul</strong> 태그</dt>
            <dd><span>순서 없는 리스트</span>를 생성하는 태그이다.</dd>
            <br>
            <dt><strong>ol</strong> 태그</dt>
            <dd><span>순서 있는 리스트</span>를 생성하는 태그이다.</dd>
            <br>
            <dt><strong>h1~h6</strong>태그</dt>
            <dd><span>제목</span>을 생성하는 태그이다.</dd>
            <br>
            <dt><strong>input</strong>태그</dt>
            <dd><span>입력</span>을 받는 태그이다.</dd>
        </dl>
        <h2>css 태그</h2>
        </dl>
        <dl></dl>
        </dl>
    </body>
</html>
