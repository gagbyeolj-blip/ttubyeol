<!DOCTYPE html>
<html>
    <head>
        <title>ㅎㅅㅎ - 예제 따라하기</title>
    </head>
    <body>
        <h2>회원 가입</h2>
        <hr class="line">
        <form action="sumit.js" method="post">
            <h3>기본 정보</h3>
            <label for="username">아이디</label>
            <input type="text" id="username" name="username">
            <label for="password">
                비밀번호
                <input type="password" id="password" name="password">
            </label>
            <hr class="line">
            <h3>선택 정보</h3>
            <h4>구분</h4>
            <label>
                 일반 회원
                 <input type="radio" name="role" value="user">
            </label>
            <label>
                    관리자
                    <input type="radio" name="role" value="group">
            </label>
            <h4>관심 분야</h4>
            <label>
                쇼핑
                <input type="checkbox" name="interest" value="shopping">
            </label>
            <label>
                뉴스
                <input type="checkbox" name="interest" value="news">
            </label>
            <label>
                맛집
                <input type="checkbox" name="interest" value="restaurea">
            </label>
            <h4>메모</h4>
            <textarea rows="5" cols="50" name="memo"></textarea>
            <h4>가입 경로</h4>
            <select name="register_route">
                <option value="SNS">SNS</option>
                <option value="ad">광고</option>
                <option value="search">직접 검색</option>
            </select>
            <hr class="line">
            <button type="submit">전송</button>
            <button type="reset">초기화</button>
            <button type="button">기타 작업</button>
        </form>
    </body>
</html>
